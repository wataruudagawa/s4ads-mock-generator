  function Stars(rating) {

  /* ---------- App（ルーティング管理） ---------- */

        h(BrowserChrome, { url: url, canBack: history.length > 0, onBack: goBack }),
        h(SiteHeader, { keyword: state.keyword, onSearch: doSearch, onLogoClick: goTop }),
        state.view === "top" ? h(TopPage, { onSearch: doSearch, onOpenProduct: openProduct }) : null,
        state.view === "search" ? h(SearchPage, { keyword: state.keyword, onOpenProduct: openProduct }) : null,
        state.view === "detail" ? h(DetailPage, { product: state.product, onOpenProduct: openProduct }) : null,
